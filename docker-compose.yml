# docker-compose.yml
# DynamicKGConstruction - Neo4j Community Edition + Jupyter retrieval notebook
#
# Usage:
#   docker compose up -d                    # Start Neo4j + Jupyter
#   docker compose logs -f neo4j            # Follow Neo4j logs
#   docker compose logs -f jupyter          # Follow Jupyter logs
#   docker compose down                     # Stop (data preserved in volumes)
#   docker compose down -v                  # Stop and delete volumes
#
# After SKGB pipeline generates CSVs, copy them to the import directory:
#   cp kg_output/kg_nodes.csv kg_output/kg_edges.csv ./neo4j/import/
# Then run the cypher script via cypher-shell or Neo4j Browser (http://localhost:7474).

services:
  neo4j:
    image: neo4j:5-community
    container_name: skgb-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:-none}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL:-512m}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX:-1G}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-256m}"
      NEO4J_server_directories_import: "/import"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/import:/import
      - neo4j_plugins:/plugins
    networks:
      - skgb-net
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  jupyter:
    build:
      context: .
      dockerfile: notebooks/Dockerfile.jupyter
    container_name: skgb-jupyter
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PYTHONPATH: /workspace
      NEO4J_URI: "${JUPYTER_NEO4J_URI:-neo4j://neo4j:7687}"
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: >
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      --ServerApp.token=${JUPYTER_TOKEN:-skgb}
      --ServerApp.root_dir=/workspace/notebooks
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - skgb-net

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:

networks:
  skgb-net:
    driver: bridge
